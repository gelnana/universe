name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = false

      - uses: cachix/cachix-action@v15
        with:
          name: gelnana
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: build
        run: nix flake check

  atelier:
    needs: build
    uses: stepbrobd/atelier/.github/workflows/discover.yaml@master
    secrets: inherit
    with:
      extra-conf: |
        extra-substituters = https://gelnana.cachix.org
        extra-trusted-public-keys = gelnana.cachix.org-1:8YX44+Ljcz5c2UZYyVcltAzZUUcACnd2aopstzFy9gs=
        experimental-features = nix-command flakes pipe-operators
